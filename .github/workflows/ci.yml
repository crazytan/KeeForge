name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -project KeeVault.xcodeproj \
            -scheme KeeVault \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -skipPackagePluginValidation \
            | xcpretty

      - name: Run unit tests
        run: |
          xcodebuild test-without-building \
            -project KeeVault.xcodeproj \
            -scheme KeeVault \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:KeeVaultTests \
            | xcpretty

      - name: Run UI tests
        run: |
          xcodebuild test-without-building \
            -project KeeVault.xcodeproj \
            -scheme KeeVault \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:KeeVaultUITests \
            | xcpretty
